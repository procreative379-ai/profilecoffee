<style>/* ============ PROFILE COFFEE — design tokens ============ */
:root {
  --bg: #ECE2CD;
  --bg-2: #F4ECD8;
  --paper: #FAF3E1;
  --ink: #1B1410;
  --ink-2: #3D2E22;
  --muted: #87705A;
  --line: #C8B89A;
  --line-soft: #D9C9AB;
  --accent: #B23A28;
  --accent-2: #8A2C1F;
  --accent-ink: #FAF3E1;
  --ok: #4F6B3B;

  --font-sans: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --font-display: 'Space Grotesk', ui-sans-serif, sans-serif;

  --r-sm: 4px;
  --r-md: 8px;
  --r-lg: 14px;

  --pad-x: clamp(20px, 4vw, 56px);
}

[data-theme="dark"] {
  --bg: #161210;
  --bg-2: #1F1A15;
  --paper: #221C16;
  --ink: #EFE3CB;
  --ink-2: #C9BBA0;
  --muted: #8B7A60;
  --line: #3A2F25;
  --line-soft: #2B231C;
  --accent: #D55742;
  --accent-2: #E27059;
  --accent-ink: #1B1410;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "ss02";
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
img { display: block; max-width: 100%; }

.mono { font-family: var(--font-mono); font-feature-settings: "ss01"; }
.upper { text-transform: uppercase; letter-spacing: 0.04em; }
.tabular { font-variant-numeric: tabular-nums; }

/* ============ App shell ============ */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ============ Header ============ */
.nav {
  position: sticky;
  top: 0;
  z-index: 40;
  background: var(--bg);
  border-bottom: 1px solid var(--line-soft);
}
.nav-inner {
  display: flex;
  align-items: center;
  gap: 32px;
  padding: 14px var(--pad-x);
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.01em;
}
.nav-logo img { width: 36px; height: 36px; object-fit: contain; }
[data-theme="dark"] .nav-logo img { filter: invert(1); }
.nav-logo small {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  display: block;
  margin-top: 2px;
  text-transform: uppercase;
}
.nav-links {
  display: flex;
  gap: 22px;
  flex: 1;
  margin-left: 14px;
}
.nav-link {
  font-size: 14px;
  color: var(--ink-2);
  padding: 4px 0;
  border-bottom: 1px solid transparent;
  transition: color .15s, border-color .15s;
}
.nav-link:hover { color: var(--ink); }
.nav-link.is-active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-actions { display: flex; align-items: center; gap: 8px; }
.nav-btn {
  background: transparent;
  border: 1px solid var(--line);
  color: var(--ink);
  padding: 8px 12px;
  border-radius: var(--r-md);
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.nav-btn:hover { background: var(--paper); }
.nav-cart-count {
  background: var(--accent);
  color: var(--accent-ink);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 999px;
  min-width: 18px;
  text-align: center;
}

/* ============ Buttons ============ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  padding: 12px 18px;
  border-radius: var(--r-md);
  border: 1px solid transparent;
  transition: transform .08s ease, background .15s, color .15s;
  white-space: nowrap;
}
.btn:active { transform: translateY(1px); }
.btn-primary { background: var(--accent); color: var(--accent-ink); }
.btn-primary:hover { background: var(--accent-2); }
.btn-ghost { background: transparent; border-color: var(--line); color: var(--ink); }
.btn-ghost:hover { background: var(--paper); }
.btn-ink { background: var(--ink); color: var(--bg); }
.btn-ink:hover { background: var(--ink-2); }
.btn-lg { padding: 16px 22px; font-size: 15px; }
.btn-sm { padding: 8px 12px; font-size: 13px; }

/* ============ Generic layout ============ */
.section {
  padding: 80px var(--pad-x);
  border-top: 1px solid var(--line-soft);
}
.section.tight { padding-top: 48px; padding-bottom: 48px; }
.section h2.eyebrow,
.eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  margin: 0 0 18px;
}
.section h2 { font-weight: 600; }
.h1 { font-size: clamp(40px, 6vw, 88px); line-height: 0.95; letter-spacing: -0.02em; font-weight: 600; margin: 0; }
.h2 { font-size: clamp(28px, 3.6vw, 48px); line-height: 1.05; letter-spacing: -0.015em; font-weight: 600; margin: 0; }
.h3 { font-size: clamp(20px, 1.8vw, 24px); font-weight: 600; margin: 0; }
.lede { font-size: clamp(16px, 1.4vw, 19px); color: var(--ink-2); max-width: 60ch; }

/* ============ Hero variants ============ */
/* Variant A — massive typography on terracotta */
.heroA {
  background: var(--accent);
  color: var(--accent-ink);
  padding: 56px var(--pad-x) 24px;
  position: relative;
  overflow: hidden;
}
.heroA .meta-row {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.7;
  margin-bottom: 24px;
}
.heroA .big {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: clamp(64px, 18vw, 280px);
  line-height: 0.82;
  letter-spacing: -0.04em;
  margin: 0;
}
.heroA .big .accent-italic { font-style: italic; font-weight: 500; }
.heroA .bottom {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr;
  gap: 32px;
  padding-top: 32px;
  margin-top: 32px;
  border-top: 1px solid rgba(250, 243, 225, 0.25);
  align-items: end;
}
.heroA .bottom p { margin: 0; font-size: 15px; line-height: 1.5; max-width: 42ch; }
.heroA .bottom .col-data { font-family: var(--font-mono); font-size: 12px; line-height: 1.7; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.06em; }
.heroA .bottom .col-data b { font-family: var(--font-sans); font-size: 14px; opacity: 1; letter-spacing: 0; text-transform: none; display: block; margin-top: 2px; font-weight: 500; }

/* Variant B — featured bag */
.heroB {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  min-height: 78vh;
  border-bottom: 1px solid var(--line-soft);
}
.heroB-left {
  padding: 64px var(--pad-x);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.heroB-left .title { font-family: var(--font-display); font-size: clamp(40px, 5vw, 72px); line-height: 1; letter-spacing: -0.02em; font-weight: 600; margin: 24px 0 0;}
.heroB-left .title em { font-style: italic; color: var(--accent); }
.heroB-left .bottom { display: flex; gap: 20px; align-items: center; }
.heroB-right {
  background: var(--accent);
  color: var(--accent-ink);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  overflow: hidden;
}
.heroB-right .specs {
  position: absolute;
  top: 24px; left: 24px; right: 24px;
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.85;
}
.heroB-right .specs-bot {
  position: absolute;
  bottom: 24px; left: 24px; right: 24px;
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.85;
}
.bag {
  width: min(360px, 70%);
  aspect-ratio: 3/4;
  background: var(--paper);
  color: var(--ink);
  border-radius: 4px 4px 22px 22px;
  padding: 26px 22px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  box-shadow: 0 30px 60px -20px rgba(0,0,0,0.4);
  position: relative;
}
.bag::before {
  content:"";
  position: absolute;
  top: -8px; left: 18%; right: 18%;
  height: 16px;
  background: var(--ink);
  border-radius: 4px 4px 2px 2px;
}
.bag-top { display: flex; flex-direction: column; gap: 4px; }
.bag-top .b-no { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.bag-top .b-name { font-family: var(--font-display); font-size: 28px; line-height: 1; font-weight: 600; }
.bag-top .b-origin { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;}
.bag-mid { display: flex; flex-direction: column; gap: 6px; }
.bag-mid .note { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-2); border-top: 1px dashed var(--line); padding-top: 6px;}
.bag-bot { font-family: var(--font-mono); font-size: 10px; line-height: 1.6; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); }
.bag-bot b { display: block; color: var(--ink); font-family: var(--font-sans); font-size: 13px; font-weight: 500; letter-spacing: 0; text-transform: none;}

/* Variant C — manifesto rail */
.heroC { padding: 0; }
.heroC-row {
  display: grid;
  grid-template-columns: 220px 1fr;
  align-items: center;
  padding: 28px var(--pad-x);
  border-bottom: 1px solid var(--line-soft);
  min-height: 200px;
}
.heroC-row .mono-tag { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
.heroC-row .text { font-family: var(--font-display); font-size: clamp(28px, 4.5vw, 64px); line-height: 1; letter-spacing: -0.02em; font-weight: 600; }
.heroC-row.dark { background: var(--ink); color: var(--bg); }
.heroC-row.dark .mono-tag { color: rgba(236, 226, 205, 0.6); }
.heroC-row.accent { background: var(--accent); color: var(--accent-ink);}
.heroC-row.accent .mono-tag { color: rgba(250, 243, 225, 0.7); }
.heroC-row em { font-style: italic; }

/* ============ Marquee strip ============ */
.strip {
  background: var(--ink);
  color: var(--bg);
  padding: 18px 0;
  overflow: hidden;
  font-family: var(--font-mono);
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.strip-track { display: flex; gap: 48px; white-space: nowrap; animation: strip 40s linear infinite; }
.strip-track span { display: inline-flex; align-items: center; gap: 14px; }
.strip-track span::after { content: "✦"; color: var(--accent); }
@keyframes strip { from { transform: translateX(0); } to { transform: translateX(-50%); }}

  gap: 8px;
}
.card-meta .row1 { display: flex; justify-content: space-between; align-items: baseline; gap: 12px;}
.card-meta .name { font-family: var(--font-display); font-size: 19px; font-weight: 600; letter-spacing: -0.01em; }
.card-meta .price { font-family: var(--font-mono); font-size: 14px; }
.card-meta .origin { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;}
.card-meta .notes { font-size: 13px; color: var(--ink-2); }
.card-meta .add {
  margin-top: 6px;
  border: 1px solid var(--ink);
  background: transparent;
  color: var(--ink);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 8px 10px;
  border-radius: var(--r-md);
}
.card-meta .add:hover { background: var(--ink); color: var(--bg); }
.card-meta .add.added { background: var(--ok); border-color: var(--ok); color: white; }

/* ============ Product page ============ */
.pdp { display: grid; grid-template-columns: 1.1fr 1fr; gap: 0; min-height: 80vh; border-bottom: 1px solid var(--line-soft);}
.pdp-image {
  background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  padding: 60px;
  min-height: 600px;
  position: relative;
}
.pdp-image .bag { width: min(380px, 80%); }
.pdp-image .label-top, .pdp-image .label-bot {
  position: absolute;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: rgba(250,243,225,0.85);
}
.pdp-image .label-top { top: 24px; left: 24px;}
.pdp-image .label-top.r { left: auto; right: 24px;}
.pdp-image .label-bot { bottom: 24px; left: 24px; }
.pdp-image .label-bot.r { left: auto; right: 24px;}

.pdp-info { padding: 60px var(--pad-x); display: flex; flex-direction: column; gap: 32px;}
.pdp-info .crumb { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);}
.pdp-info h1 { font-family: var(--font-display); font-size: clamp(40px, 5vw, 68px); line-height: 0.95; letter-spacing: -0.02em; font-weight: 600; margin: 0;}
.pdp-info h1 em { font-style: italic; color: var(--accent);}
.pdp-info .price-row { display: flex; gap: 18px; align-items: baseline; padding: 18px 0; border-top: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft);}
.pdp-info .price-row .price { font-family: var(--font-display); font-size: 34px; font-weight: 600; }
.pdp-info .price-row small { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;}
.opt-group { display: flex; flex-direction: column; gap: 10px; }
.opt-group .lbl { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);}
.opts { display: flex; gap: 6px; flex-wrap: wrap;}
.opt {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 8px 12px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--ink);
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.opt.is-active { background: var(--ink); color: var(--bg); border-color: var(--ink);}

.profile-chart {
  display: grid;
  grid-template-columns: 100px 1fr 40px;
  gap: 10px 12px;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.profile-chart .bar {
  height: 8px;
  background: var(--line-soft);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.profile-chart .bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 999px;
}
.profile-chart .val { font-family: var(--font-mono); text-align: right;}

.pdp-spec-table {
  width: 100%;
  border-collapse: collapse;
  font-family: var(--font-mono);
  font-size: 12px;
}
.pdp-spec-table td {
  padding: 12px 0;
  border-bottom: 1px solid var(--line-soft);
  vertical-align: top;
}
.pdp-spec-table td:first-child { color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; width: 40%; }
.pdp-spec-table td:last-child { color: var(--ink); }

/* ============ Cart drawer ============ */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(20, 16, 12, 0.4);
  z-index: 90;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.drawer-overlay.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed;
  top: 0; right: 0;
  height: 100vh;
  width: min(460px, 96vw);
  background: var(--bg);
  z-index: 100;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform .25s ease;
  border-left: 1px solid var(--line);
}
.drawer.open { transform: translateX(0); }
.drawer-head { padding: 20px 24px; border-bottom: 1px solid var(--line-soft); display: flex; justify-content: space-between; align-items: center;}
.drawer-head h3 { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin: 0;}
.drawer-close { background: transparent; border: none; color: var(--ink); font-size: 22px; cursor: pointer;}
.drawer-body { flex: 1; overflow-y: auto; padding: 16px 24px;}
.drawer-body .empty { color: var(--muted); font-family: var(--font-mono); font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em; padding: 60px 0; text-align: center;}
.cart-line {
  display: grid;
  grid-template-columns: 64px 1fr auto;
  gap: 14px;
  padding: 16px 0;
  border-bottom: 1px solid var(--line-soft);
}
.cart-line .thumb {
  aspect-ratio: 3/4;
  background: var(--accent);
  border-radius: 4px;
}
.cart-line .nm { font-family: var(--font-display); font-size: 16px; font-weight: 600;}
.cart-line .sub { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;}
.cart-line .qty { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.cart-line .qty button { width: 24px; height: 24px; border: 1px solid var(--line); background: transparent; color: var(--ink); border-radius: 4px;}
.cart-line .qty span { font-family: var(--font-mono); font-size: 13px; min-width: 18px; text-align: center;}
.cart-line .price { font-family: var(--font-mono); font-size: 13px; align-self: start;}
.cart-line .rm { background: none; border: none; color: var(--muted); font-family: var(--font-mono); font-size: 11px; text-decoration: underline; padding: 0; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.06em;}
.drawer-foot { padding: 20px 24px; border-top: 1px solid var(--line-soft); display: flex; flex-direction: column; gap: 12px;}
.drawer-foot .total { display: flex; justify-content: space-between; font-family: var(--font-display); font-size: 22px; font-weight: 600;}

/* ============ Subscription ============ */
.sub-plans { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-top: 24px;}
.sub-plan {
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 28px;
  background: var(--paper);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.sub-plan.feat { background: var(--ink); color: var(--bg); border-color: var(--ink);}
.sub-plan.feat .muted, .sub-plan.feat li { color: var(--bg);}
.sub-plan .frq { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted);}
.sub-plan .nm { font-family: var(--font-display); font-size: 32px; font-weight: 600; line-height: 1;}
.sub-plan .pr { font-family: var(--font-mono); font-size: 14px;}
.sub-plan ul { margin: 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 6px; font-size: 14px; color: var(--ink-2);}
.sub-plan li::before { content: "→ "; color: var(--accent); font-family: var(--font-mono);}
.sub-plan.feat li::before { color: var(--accent-2);}

/* ============ Wholesale ============ */
.split { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
.split.thirds { grid-template-columns: repeat(3, 1fr); }
.fact { border-top: 1px solid var(--line-soft); padding-top: 14px;}
.fact .big-num { font-family: var(--font-display); font-size: clamp(36px, 4vw, 56px); font-weight: 600; line-height: 1;}
.fact .lbl { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-top: 6px;}

/* ============ About story ============ */
.story-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start;}
.timeline { display: flex; flex-direction: column; gap: 20px;}
.timeline-item {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 24px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--line-soft);
}
.timeline-item .y { font-family: var(--font-mono); font-size: 14px; color: var(--accent);}
.timeline-item .ev { font-size: 15px; color: var(--ink); }
.timeline-item .ev b { font-family: var(--font-display); display: block; font-size: 18px; margin-bottom: 4px; font-weight: 600;}

.team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.team-card { display: flex; flex-direction: column; gap: 10px;}
.team-card .ph {
  aspect-ratio: 4/5;
  background: var(--paper);
  border: 1px solid var(--line-soft);
  border-radius: var(--r-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  position: relative;
  overflow: hidden;
}
.team-card .ph::after {
  content: "";
  position: absolute; inset: 0;
  background: repeating-linear-gradient(45deg, transparent 0 12px, var(--line-soft) 12px 13px);
  opacity: 0.5;
}
.team-card .ph span { position: relative; z-index: 1; background: var(--bg-2); padding: 4px 8px; border-radius: 4px;}
.team-card .nm { font-family: var(--font-display); font-size: 18px; font-weight: 600;}
.team-card .role { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.08em;}

/* ============ Contacts ============ */
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px;}
.contact-card { padding: 28px; border: 1px solid var(--line-soft); border-radius: var(--r-lg); background: var(--paper);}
.contact-card h3 { font-family: var(--font-display); font-size: 22px; font-weight: 600; margin: 0 0 14px;}
.contact-card .line { font-family: var(--font-mono); font-size: 13px; padding: 6px 0; color: var(--ink-2); }
.contact-card .line b { display: block; font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 2px; font-weight: 500;}
.map-placeholder {
  margin-top: 24px;
  aspect-ratio: 16/7;
  background:
    linear-gradient(var(--accent), var(--accent)) center/2px 100% no-repeat,
    repeating-linear-gradient(0deg, transparent 0 60px, var(--line-soft) 60px 61px),
    repeating-linear-gradient(90deg, transparent 0 60px, var(--line-soft) 60px 61px),
    var(--paper);
  border-radius: var(--r-lg);
  border: 1px solid var(--line-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  position: relative;
}
.map-pin {
  position: absolute;
  width: 14px; height: 14px;
  background: var(--accent);
  border-radius: 50%;
  border: 3px solid var(--paper);
  box-shadow: 0 0 0 1px var(--accent);
}

.map-card {
  display: block;
  margin-top: 24px;
  border-radius: var(--r-lg);
  border: 1px solid var(--line-soft);
  background: var(--paper);
  overflow: hidden;
  position: relative;
  text-decoration: none;
  color: inherit;
  transition: transform .15s ease, box-shadow .2s ease, border-color .15s;
}
.map-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 18px 36px -18px rgba(0,0,0,0.25);
}
.map-card:hover .map-cta { background: var(--accent); color: var(--accent-ink); }
.map-canvas {
  aspect-ratio: 16/7;
  position: relative;
  color: var(--ink-2);
}
.map-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.map-pin-wrap {
  position: absolute;
  top: 50%; left: 38%;
  transform: translate(-50%, -100%);
}
.map-pin-dot {
  position: relative;
  width: 18px; height: 18px;
  background: var(--accent);
  border-radius: 50%;
  border: 4px solid var(--paper);
  box-shadow: 0 0 0 1px var(--accent), 0 8px 16px -4px rgba(0,0,0,0.25);
  margin: 0 auto;
}
.map-pin-pulse {
  position: absolute;
  top: 9px; left: 50%;
  width: 18px; height: 18px;
  background: var(--accent);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  opacity: 0.45;
  animation: pulse 2s ease-out infinite;
  pointer-events: none;
}
@keyframes pulse {
  0% { opacity: 0.45; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(3.5); }
}
.map-pin-label {
  position: absolute;
  left: 50%;
  bottom: calc(100% + 10px);
  transform: translateX(-50%);
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 10px 14px;
  white-space: nowrap;
  box-shadow: 0 8px 24px -8px rgba(0,0,0,0.18);
}
.map-pin-label::after {
  content: "";
  position: absolute;
  top: 100%; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 6px solid var(--line);
}
.map-cta {
  position: absolute;
  right: 16px; bottom: 16px;
  background: var(--ink);
  color: var(--bg);
  padding: 10px 14px;
  border-radius: var(--r-md);
  display: inline-flex;
  align-items: center;
  gap: 10px;
  transition: background .15s, color .15s;
}

/* ============ Blog ============ */
.posts { display: grid; grid-template-columns: 1fr 1fr; gap: 36px; }
.post {
  display: flex; flex-direction: column; gap: 16px;
  border-top: 1px solid var(--line-soft);
  padding-top: 24px;
}
.post .cover {
  aspect-ratio: 16/10;
  background: var(--accent);
  border-radius: var(--r-md);
  position: relative;
  overflow: hidden;
}
.post .cover.alt-1 { background: var(--ink);}
.post .cover.alt-2 { background: linear-gradient(135deg, #C99553, #8E6125);}
.post .cover.alt-3 { background: linear-gradient(135deg, #2D5F4F, #1B4034);}
.post .cover .swatch {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.9);
  font-family: var(--font-mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.post .tag { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; color: var(--accent); letter-spacing: 0.08em;}
.post .tt { font-family: var(--font-display); font-size: 24px; font-weight: 600; line-height: 1.15; letter-spacing: -0.01em;}
.post .meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;}

/* ============ Courses ============ */
.courses { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;}
.course {
  border: 1px solid var(--line);
  padding: 24px;
  border-radius: var(--r-lg);
  display: flex;
  flex-direction: column;
  gap: 12px;
  background: var(--paper);
}
.course .lvl { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent);}
.course .nm { font-family: var(--font-display); font-size: 24px; font-weight: 600; line-height: 1.1;}
.course .row { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;}
.course p { margin: 0; color: var(--ink-2); font-size: 14px;}
.course .price { font-family: var(--font-display); font-size: 22px; font-weight: 600;}

/* ============ Checkout ============ */
.checkout { display: grid; grid-template-columns: 1.4fr 1fr; gap: 48px; align-items: start;}
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px;}
.field label { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted);}
.field input, .field textarea {
  font-family: var(--font-sans);
  font-size: 14px;
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 12px;
  border-radius: var(--r-md);
  color: var(--ink);
}
.field input:focus, .field textarea:focus { outline: none; border-color: var(--accent);}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px;}
.summary-box {
  background: var(--paper);
  border: 1px solid var(--line-soft);
  border-radius: var(--r-lg);
  padding: 28px;
  position: sticky;
  top: 100px;
}
.summary-box h3 { font-family: var(--font-display); font-size: 20px; font-weight: 600; margin: 0 0 14px;}
.summary-box .row { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 13px; padding: 6px 0;}
.summary-box .total { font-family: var(--font-display); font-size: 24px; font-weight: 600; border-top: 1px solid var(--line); padding-top: 14px; margin-top: 14px; display: flex; justify-content: space-between;}

.success {
  text-align: center;
  padding: 100px 40px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  align-items: center;
}
.success .check {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--accent); color: var(--accent-ink);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
}

/* ============ Footer ============ */
.footer {
  margin-top: auto;
  padding: 60px var(--pad-x) 24px;
  background: var(--ink);
  color: var(--bg);
}
.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 48px;
  padding-bottom: 48px;
  border-bottom: 1px solid rgba(236, 226, 205, 0.15);
}
.footer-grid h4 { font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(236,226,205,0.6); margin: 0 0 14px; font-weight: 500;}
.footer-grid a { display: block; padding: 4px 0; font-size: 14px;}
.footer-grid a:hover { color: var(--accent-2);}
.footer-big { font-family: var(--font-display); font-size: clamp(48px, 6vw, 88px); line-height: 0.9; letter-spacing: -0.02em; font-weight: 600; padding: 32px 0 8px;}
.footer-bottom { padding-top: 16px; display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(236,226,205,0.5);}

/* ============ Toast ============ */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: var(--bg);
  padding: 12px 20px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0;
  pointer-events: none;
  transition: all .2s;
  z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0);}

.mp-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.mp-card {
  display: grid;
  grid-template-columns: 80px 1fr 24px;
  align-items: center;
  gap: 18px;
  padding: 22px 24px;
  background: var(--paper);
  border: 1px solid var(--line-soft);
  border-radius: var(--r-lg);
  text-decoration: none;
  color: inherit;
  transition: transform .12s, border-color .15s, box-shadow .2s;
}
.mp-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 16px 32px -16px rgba(0,0,0,0.18);
}
.mp-card:hover .mp-arrow { color: var(--accent);}
.mp-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 64px; height: 64px;
  background: var(--ink);
  color: var(--bg);
  border-radius: var(--r-md);
  font-family: var(--font-mono);
  font-size: 19px;
  font-weight: 500;
  letter-spacing: 0;
}
.mp-info .mp-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: -0.01em;}
.mp-info .mp-sub { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px;}
.mp-arrow { font-family: var(--font-mono); font-size: 20px; color: var(--muted); transition: color .15s;}

@media (max-width: 900px) {
  .mp-grid { grid-template-columns: 1fr; gap: 10px;}
  .mp-card { padding: 16px 18px; grid-template-columns: 56px 1fr 20px; gap: 14px;}
  .mp-logo { width: 48px; height: 48px; font-size: 15px;}
  .mp-info .mp-title { font-size: 15px;}
}

/* ============ Header burger + mobile menu ============ */
.nav-links-desktop { display: flex; }
.nav-burger {
  display: none;
  width: 44px; height: 44px;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
}
.nav-burger span {
  display: block;
  width: 18px;
  height: 1.5px;
  background: var(--ink);
  border-radius: 999px;
  transition: transform .2s, opacity .15s;
}
.nav-burger.is-open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
.nav-burger.is-open span:nth-child(2) { opacity: 0; }
.nav-burger.is-open span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }

.mob-menu {
  position: fixed;
  inset: 0;
  background: rgba(20, 16, 12, 0.5);
  z-index: 90;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.mob-menu.open { opacity: 1; pointer-events: auto; }
.mob-menu-panel {
  position: absolute;
  top: 64px;
  left: 0; right: 0;
  bottom: 0;
  background: var(--bg);
  padding: 24px 20px 32px;
  overflow-y: auto;
  transform: translateY(-12px);
  transition: transform .25s ease;
  display: flex;
  flex-direction: column;
  gap: 28px;
}
.mob-menu.open .mob-menu-panel { transform: translateY(0); }

.mob-links { display: flex; flex-direction: column; gap: 0;}
.mob-link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  color: var(--ink);
  padding: 16px 4px;
  border-bottom: 1px solid var(--line-soft);
  text-decoration: none;
  letter-spacing: -0.01em;
}
.mob-link.is-active { color: var(--accent); }
.mob-link .mob-arrow { font-family: var(--font-mono); font-size: 16px; color: var(--muted); }
.mob-link.is-active .mob-arrow { color: var(--accent); }

.mob-contact { display: flex; flex-direction: column; gap: 0; }
.mob-eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
.mob-cta-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--ink);
  text-decoration: none;
  margin-bottom: 8px;
}
.mob-cta-row:active { background: var(--paper); }

.nav-btn-label { display: inline; }
@media (max-width: 600px) {
  .nav-btn-label { display: none; }
}

.stm-cta {
  margin-top: 48px;
  padding: 28px;
  background: rgba(27,20,16,0.18);
  border-radius: var(--r-lg);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
  align-items: center;
}
@media (max-width: 900px) {
  .stm-cta { grid-template-columns: 1fr; padding: 20px; }
}

/* ============ Responsive ============ */
@media (max-width: 1100px) {
  .footer-grid { grid-template-columns: 1fr 1fr; gap: 32px; }
}
@media (max-width: 900px) {
  :root { --pad-x: 18px; }
  .nav-inner { gap: 10px; padding: 12px var(--pad-x); height: 64px;}
  .nav-logo { font-size: 16px; }
  .nav-logo img { width: 30px; height: 30px;}
  .nav-logo small { font-size: 9px;}
  .nav-links-desktop { display: none; }
  .nav-burger { display: flex; }
  .nav-btn-theme { display: none; }
  .nav-actions { flex-shrink: 0; gap: 6px; }
  .nav-btn { padding: 8px 12px; font-size: 13px;}

  .section { padding: 48px var(--pad-x); }
  .section.tight { padding-top: 32px; padding-bottom: 32px; }

  .heroA { padding: 36px var(--pad-x) 24px; }
  .heroA .meta-row { flex-direction: column; gap: 6px; margin-bottom: 18px; align-items: flex-start;}
  .heroA .big { font-size: clamp(56px, 16vw, 96px); }
  .heroA .bottom { grid-template-columns: 1fr; gap: 18px; padding-top: 22px; margin-top: 22px;}
  .heroA .bottom > div:last-child { justify-content: flex-start; }

  .heroB { grid-template-columns: 1fr; min-height: auto; }
  .heroB-left { padding: 40px var(--pad-x); gap: 24px;}
  .heroB-left .bottom { flex-direction: column; align-items: stretch; gap: 10px; }
  .heroB-left .bottom .btn { width: 100%; }
  .heroB-right { min-height: 380px; padding: 32px 20px;}
  .heroB-right .specs, .heroB-right .specs-bot { left: 16px; right: 16px; font-size: 10px; }
  .heroB-right .specs { top: 16px; }
  .heroB-right .specs-bot { bottom: 16px; }
  .bag { width: min(280px, 78%); }

  .heroC-row { grid-template-columns: 1fr; gap: 8px; padding: 22px var(--pad-x); min-height: 0; }
  .heroC-row .text { font-size: clamp(28px, 7vw, 44px); }
  .heroC-row .text .btn { display: block; margin: 8px 0 0 !important; width: fit-content;}

  .h1 { font-size: clamp(36px, 9vw, 56px);}
  .h2 { font-size: clamp(24px, 6vw, 38px); }

  .strip { padding: 14px 0; font-size: 11px;}
  .strip-track { gap: 32px; }

  .catalog { padding: 24px var(--pad-x) 56px;}
  .catalog-head { gap: 14px; padding-bottom: 18px; margin-bottom: 18px; }
  .filters { gap: 4px; }
  .filter { font-size: 11px; padding: 5px 10px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  .card-thumb { aspect-ratio: 4/5; padding: 18px;}
  .card-thumb .bag-mini { width: 78%; }
  .card-thumb .bag-mini .b-name { font-size: 15px;}
  .card-meta { padding: 14px 14px 16px; }
  .card-meta .name { font-size: 17px;}
  .card-meta .price { font-size: 13px;}

  .pdp { grid-template-columns: 1fr; }
  .pdp-image { min-height: 420px; padding: 40px 20px; }
  .pdp-image .bag { width: min(260px, 70%); }
  .pdp-info { padding: 40px var(--pad-x); gap: 24px; }
  .pdp-info h1 { font-size: clamp(36px, 9vw, 56px);}
  .pdp-info .price-row { flex-wrap: wrap; gap: 10px 14px; padding: 14px 0; }
  .pdp-info .price-row .price { font-size: 26px;}
  .pdp-info .price-row > div:last-child { margin-left: 0; }
  .opts { gap: 4px; }
  .opt { font-size: 11px; padding: 7px 10px; }
  .profile-chart { grid-template-columns: 90px 1fr 36px; font-size: 10px; }

  .pdp-spec-table { font-size: 11px;}
  .pdp-spec-table td { padding: 10px 0; }

  .split, .split.thirds { grid-template-columns: 1fr; gap: 32px;}
  .story-grid { grid-template-columns: 1fr; gap: 36px;}
  .timeline-item { grid-template-columns: 60px 1fr; gap: 14px; padding-bottom: 16px;}
  .timeline-item .y { font-size: 12px; }
  .timeline-item .ev b { font-size: 16px;}

  .team-grid { grid-template-columns: 1fr 1fr; gap: 16px;}
  .team-card .ph { aspect-ratio: 3/4;}

  .contact-grid { grid-template-columns: 1fr; gap: 16px;}
  .contact-card { padding: 22px;}
  .contact-card h3 { font-size: 19px; }
  .contact-card .line { font-size: 12px; }
  .map-placeholder { aspect-ratio: 16/12; font-size: 10px; padding: 16px; text-align: center;}
  .map-canvas { aspect-ratio: 4/5;}
  .map-pin-wrap { top: 45%; left: 50%;}
  .map-pin-label { padding: 8px 10px;}
  .map-pin-label > div:nth-child(2) { font-size: 14px;}
  .map-cta { right: 10px; bottom: 10px; padding: 8px 11px;}
  .map-cta span:first-child { font-size: 10px;}

  .posts { grid-template-columns: 1fr; gap: 28px;}
  .post .tt { font-size: 21px;}

  .courses { grid-template-columns: 1fr; gap: 14px;}
  .course { padding: 20px;}
  .course .nm { font-size: 21px;}

  .checkout { grid-template-columns: 1fr; gap: 28px;}
  .summary-box { position: static; padding: 22px;}
  .field-row { grid-template-columns: 1fr; gap: 0;}
  .field input, .field textarea { font-size: 16px; padding: 11px;} /* avoid iOS zoom */

  .drawer { width: 100vw; }
  .drawer-head { padding: 16px 18px;}
  .drawer-body { padding: 12px 18px; }
  .drawer-foot { padding: 16px 18px;}
  .drawer-foot .total { font-size: 19px;}

  .footer { padding: 44px var(--pad-x) 20px;}
  .footer-grid { grid-template-columns: 1fr 1fr; gap: 24px; padding-bottom: 32px;}
  .footer-big { font-size: clamp(36px, 10vw, 56px); padding: 20px 0 6px;}
  .footer-bottom { flex-direction: column; gap: 6px;}

  .tweaks-toggle, .twk-toggle-btn { transform: scale(0.9); }
}

@media (max-width: 540px) {
  .footer-grid { grid-template-columns: 1fr; }
  .team-grid { grid-template-columns: 1fr;}
  .heroA .big { font-size: clamp(48px, 18vw, 80px);}
  .h1 { font-size: clamp(32px, 11vw, 48px);}
  .card-meta .row1 { flex-wrap: wrap; }
  .pdp-image { min-height: 360px;}
}
</style>
</head>

  .twk-chip svg{position:absolute;top:6px;left:6px;width:13px;height:13px;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});
</script>

<script type="text/babel">// App root — routing, tweaks
const { useState: useStateApp, useEffect: useEffectApp, useMemo: useMemoApp } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroVariant": "A",
  "theme": "light"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);

  const [route, setRoute] = useStateApp("home");
  const [productId, setProductId] = useStateApp(null);
  const [theme, setTheme] = useStateApp(t.theme || "light");

  useEffectApp(() => {
    document.documentElement.dataset.theme = theme;
    setTweak("theme", theme);
  }, [theme]);

  useEffectApp(() => {
    window.scrollTo({ top: 0, behavior: "instant" });
  }, [route, productId]);

  function navigate(r) {
    if (typeof r === "string" && r.startsWith("product:")) {
      setProductId(r.slice("product:".length));
      setRoute("product");
    } else if (typeof r === "string" && r.startsWith("post:")) {
      setProductId(r.slice("post:".length));
      setRoute("post");
    } else {
      setRoute(r);
      setProductId(null);
    }
  }

  let screen = null;
  if (route === "home") screen = <window.HomeScreen navigate={navigate} heroVariant={t.heroVariant} />;
  else if (route === "catalog") screen = <window.CatalogScreen navigate={navigate} />;
  else if (route === "product") screen = <window.ProductScreen id={productId} navigate={navigate} />;
  else if (route === "about") screen = <window.AboutScreen navigate={navigate} />;
  else if (route === "wholesale") screen = <window.WholesaleScreen navigate={navigate} />;
  else if (route === "contacts") screen = <window.ContactsScreen navigate={navigate} />;
  else if (route === "blog") screen = <window.BlogScreen navigate={navigate} />;
  else if (route === "post") screen = <window.BlogPostScreen slug={productId} navigate={navigate} />;
  else screen = <window.HomeScreen navigate={navigate} heroVariant={t.heroVariant} />;

  return (
    <div className="app" data-screen-label={`${route}${productId ? " · " + productId : ""}`}>
      <window.NavBar
        route={route}
        navigate={navigate}
        theme={theme}
        setTheme={setTheme}
      />
      <main>{screen}</main>
      <window.Footer navigate={navigate} />

      <window.TweaksPanel title="Tweaks">
        <window.TweakSection title="Главная — варианты hero">
          <window.TweakRadio
            label="Hero"
            value={t.heroVariant}
            options={[
              { value: "A", label: "Манифест" },
              { value: "B", label: "Лот" },
              { value: "C", label: "Лента" }
            ]}
            onChange={(v) => setTweak("heroVariant", v)}
          />
        </window.TweakSection>
        <window.TweakSection title="Тема">
          <window.TweakRadio
            label="Тема"
            value={theme}
            options={[
              { value: "light", label: "Светлая" },
              { value: "dark", label: "Тёмная" }
            ]}
            onChange={(v) => setTheme(v)}
          />
        </window.TweakSection>
        <window.TweakSection title="Подсказка">
          <div style={{fontSize: 12, color: "rgba(255,255,255,0.6)", lineHeight: 1.5}}>
            Hero-варианты переключаются на главной странице. Тёмная тема работает везде.
          </div>
        </window.TweakSection>
      </window.TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
